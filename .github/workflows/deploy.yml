name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Documents/Claude/work-adjustment-pond/package-lock.json
      - run: npm ci
        working-directory: Documents/Claude/work-adjustment-pond
      - run: npm run build
        working-directory: Documents/Claude/work-adjustment-pond
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Documents/Claude/work-adjustment-pond/dist
      - uses: actions/deploy-pages@v4
        id: deployment
